<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur BTS — Convocations & Émargements</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root,[data-theme="light"]{
  --bg:#f7f6f2;--surface:#fff;--surface2:#f3f0ec;--border:#ddd;
  --text:#28251d;--muted:#7a7974;--faint:#bab9b4;
  --primary:#01696f;--primary-h:#0c4e54;
  --success:#437a22;--error:#c0392b;
  --font:"Inter",sans-serif;
}
[data-theme="dark"]{
  --bg:#171614;--surface:#1c1b19;--surface2:#252320;--border:#3a3835;
  --text:#cdccca;--muted:#888;--faint:#555;
  --primary:#4f98a3;--primary-h:#227f8b;
  --success:#6daa45;--error:#e74c3c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.header-brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center}
.brand-icon svg{color:#fff}
.brand-name{font-weight:600;font-size:15px}
.brand-sub{font-size:11px;color:var(--muted)}
.theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;color:var(--muted);transition:.18s}
.theme-btn:hover{color:var(--text);border-color:var(--primary)}

.main{max-width:860px;margin:0 auto;padding:32px 24px}
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:var(--primary);color:#fff;border-radius:50%;font-size:11px;font-weight:700;margin-right:8px}
.step-title{font-weight:600;font-size:15px;display:inline;vertical-align:middle}

.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:40px 24px;text-align:center;cursor:pointer;transition:.2s;margin-top:16px;user-select:none}
.drop-zone:hover{border-color:var(--primary);background:rgba(1,105,111,.04)}
.drop-zone.over{border-color:var(--primary);background:rgba(1,105,111,.1);transform:scale(1.01)}
.drop-zone svg{color:var(--primary);margin:0 auto 12px}
.dz-label{font-weight:500;font-size:14px;margin-bottom:4px}
.dz-hint{font-size:12px;color:var(--muted)}
.dz-btn{margin-top:14px;display:inline-block;background:var(--primary);color:#fff;padding:8px 20px;border-radius:6px;font-size:13px;font-weight:500}

.status{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:13px;display:none;align-items:center;gap:8px;justify-content:space-between}
.status-text{flex:1;min-width:0}
.status-clear{display:none;flex:0 0 auto;width:26px;height:26px;border-radius:999px;border:1px solid currentColor;align-items:center;justify-content:center;background:transparent;color:inherit;cursor:pointer;transition:.18s}
.status-clear:hover{background:rgba(192,57,43,.12);color:#c0392b}
.status.show{display:flex}
.status.ok{background:rgba(67,122,34,.1);color:var(--success);border:1px solid rgba(67,122,34,.25)}
.status.err{background:rgba(192,57,43,.1);color:var(--error);border:1px solid rgba(192,57,43,.25)}
.status.info{background:rgba(1,105,111,.1);color:var(--primary);border:1px solid rgba(1,105,111,.25)}

.controls{display:none}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.form-group select,.form-group input{padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);transition:.18s}
.form-group select:focus,.form-group input:focus{outline:2px solid var(--primary);outline-offset:1px;border-color:var(--primary)}

/* Info box résumé */
.info-box{background:rgba(1,105,111,.06);border:1px solid rgba(1,105,111,.2);border-radius:8px;padding:12px 14px;margin-top:16px;font-size:12px;color:var(--primary);display:none}
.info-box strong{font-weight:600}

.btn-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:.18s;font-family:var(--font)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-h)}
.btn-primary:active{transform:scale(.98)}
.btn-ghost{background:var(--surface2);color:var(--text);border-color:var(--border)}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}

.preview-section{display:none;margin-top:20px}
.preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.preview-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.count-badge{background:rgba(1,105,111,.12);color:var(--primary);font-size:11px;font-weight:600;padding:3px 9px;border-radius:12px}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px}
table.preview{width:100%;border-collapse:collapse;font-size:12px}
table.preview thead th{background:var(--surface2);padding:8px 10px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
table.preview tbody td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.05);white-space:nowrap}
table.preview tbody tr:last-child td{border-bottom:none}
table.preview tbody tr:hover td{background:var(--surface2)}

/* ═══════════ IMPRESSION ═══════════ */
#print-area{display:none}

@media print{
  body>*:not(#print-area){display:none!important}
  #print-area{display:block!important}

  /* Saut de page entre chaque document */
  .page-break{page-break-after:always;break-after:page}

  /* ── CONVOCATION : portrait A4 ── */
  @page conv{size:A4 portrait;margin:1.8cm 2cm}
  .conv-page{font-family:Arial,Helvetica,sans-serif;font-size:11pt;line-height:1.5;page:conv}

  .conv-bandeau{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px double #111;padding-bottom:10px;margin-bottom:18px;gap:16px}
  .conv-bandeau .left-wrap{display:flex;align-items:flex-start;gap:12px;max-width:70%}
  .conv-bandeau .logo-chev{width:150px;max-height:60px;object-fit:contain;display:block}
  .conv-bandeau .etab{font-size:9pt;line-height:1.7}
  .conv-bandeau .ref{text-align:right;font-size:9pt;line-height:1.7;font-weight:500}
  .conv-h1{font-size:20pt;font-weight:bold;text-align:center;text-transform:uppercase;letter-spacing:3px;margin:0 0 4px}
  .conv-h2{font-size:11pt;font-weight:bold;text-align:center;color:#444;margin-bottom:22px;border-bottom:1px solid #ccc;padding-bottom:10px}
  .conv-ident{margin-bottom:18px;font-size:11pt}
  .conv-ident p{margin-bottom:4px}
  .conv-encadre{border:1.5px solid #222;border-radius:3px;padding:14px 16px;margin:0 0 16px;background:#fafafa}
  .conv-encadre table{width:100%;border-collapse:collapse;font-size:11pt}
  .conv-encadre td{padding:5px 0;vertical-align:top}
  .conv-encadre td:first-child{font-weight:bold;color:#333;width:44%;padding-right:8px}
  .conv-note{font-size:9pt;color:#555;border:1px dashed #bbb;padding:8px 10px;border-radius:3px;margin-bottom:16px}
  .conv-footer-row{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-top:24px}
  .conv-footer-left{min-width:140px;text-align:left}
  .conv-footer-left .ac-logo{width:120px;max-height:90px;object-fit:contain;display:block}
  .conv-sign{margin-top:0;text-align:right;font-size:10pt;flex:1}
  .conv-sign .titre{font-style:italic;color:#555;margin-bottom:6px}
  .conv-sign .signature-img{display:block;max-width:220px;max-height:90px;margin:8px 0 6px auto;object-fit:contain}
  .conv-sign .espace{height:12px}

  /* ── ÉMARGEMENT : paysage A4 ── */
  @page emarg{size:A4 landscape;margin:1cm 1.4cm}
  .emarg-page{font-family:Arial,Helvetica,sans-serif;font-size:9pt;page:emarg}

  .emarg-entete{border:2px solid #000;padding:8px 12px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:6px 30px;align-items:center}
  .emarg-titre{font-size:14pt;font-weight:bold;text-transform:uppercase;width:100%;text-align:center;margin-bottom:6px;letter-spacing:1px}
  .emarg-entete span{font-size:9pt}
  .emarg-entete span strong{font-weight:bold}

  .emarg-table{width:100%;border-collapse:collapse;font-size:8.5pt;margin-top:8px}
  .emarg-table th{background:#d5d5d5;border:1.5px solid #000;padding:5px 6px;text-align:center;font-weight:bold;font-size:8pt}
  .emarg-table td{border:1px solid #666;padding:5px 7px;vertical-align:middle;min-height:18px}
  .emarg-table tr:nth-child(even) td{background:#f2f2f2}
  .col-nom{width:18%}
  .col-prenom{width:13%}
  .col-naiss{width:11%;text-align:center!important}
  .col-id{width:12%;text-align:center!important}
  .col-rep{width:8%;text-align:center!important}
  .col-heure{width:10%;text-align:center!important}
  .col-sign{width:14%}

  .emarg-bas{margin-top:10px;font-size:8pt;color:#555;border-top:1px solid #aaa;padding-top:6px;display:flex;justify-content:space-between}
}

@media (max-width:600px){
  .form-grid{grid-template-columns:1fr}
  .main{padding:20px 14px}
  .header{padding:10px 16px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="brand-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">Générateur BTS Industriels</div>
      <div class="brand-sub">Convocations &amp; Feuilles d'émargement</div>
    </div>
  </div>
  <button class="theme-btn" id="theme-btn">🌙 Mode sombre</button>
</header>

<main class="main">

  <!-- ÉTAPE 1 -->
  <div class="step-card">
    <span class="step-num">1</span>
    <span class="step-title">Importer le fichier Excel</span>
    <div class="drop-zone" id="drop-zone">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/>
      </svg>
      <div class="dz-label">Déposez votre fichier Excel ici</div>
      <div class="dz-hint">Format accepté : .xlsx — .xls</div>
      <div class="dz-btn">📂 Parcourir…</div>
    </div>
    <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none">
    <div class="status" id="status-msg"><span class="status-text" id="status-text"></span><button type="button" class="status-clear" id="status-clear" aria-label="Supprimer le fichier chargé" title="Supprimer le fichier chargé"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></div>
  </div>

  <!-- ÉTAPE 2 -->
  <div class="step-card controls" id="controls">
    <span class="step-num">2</span>
    <span class="step-title">Paramétrer la génération</span>

    <div class="form-grid">
      <div class="form-group">
        <label for="sheet-sel">Feuille / Classe</label>
        <select id="sheet-sel"></select>
      </div>
      <div class="form-group">
        <label for="doc-type">Documents à générer</label>
        <select id="doc-type">
          <option value="both">Convocations + Émargement</option>
          <option value="conv">Convocations uniquement</option>
          <option value="emarg">Émargement uniquement</option>
        </select>
      </div>
      <div class="form-group">
        <label for="f-etab">Établissement</label>
        <input id="f-etab" type="text" value="Lycée Chevrollier — Angers">
      </div>
      <div class="form-group">
        <label for="f-centre">Centre d'examen / Jury</label>
        <input id="f-centre" type="text" value="Lycée Chevrollier">
      </div>
    </div>

    <div class="info-box" id="info-box"></div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btn-gen">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        Générer et imprimer
      </button>
      <button class="btn btn-ghost" id="btn-preview">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Aperçu des données
      </button>
      <button class="btn btn-ghost" id="btn-reset">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 3 3 9 9 9"/></svg>
        Réinitialiser
      </button>
    </div>
  </div>

  <!-- APERÇU -->
  <div class="preview-section" id="preview-section">
    <div class="preview-header">
      <span class="preview-label" id="preview-lbl">Aperçu</span>
      <span class="count-badge" id="count-badge"></span>
    </div>
    <div class="tbl-wrap">
      <table class="preview">
        <thead id="tbl-head"></thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
  </div>

</main>

<div id="print-area"></div>

<script>
// THEME
(function(){
  var btn = document.getElementById("theme-btn");
  var html = document.documentElement;
  var dark = window.matchMedia("(prefers-color-scheme:dark)").matches;
  html.setAttribute("data-theme", dark ? "dark" : "light");
  btn.textContent = dark ? "☀️ Mode clair" : "🌙 Mode sombre";
  btn.addEventListener("click", function(){
    dark = !dark;
    html.setAttribute("data-theme", dark ? "dark" : "light");
    btn.textContent = dark ? "☀️ Mode clair" : "🌙 Mode sombre";
  });

var allSheets = {};

function showStatus(msg, type, showClear) {
  var el = document.getElementById("status-msg");
  var text = document.getElementById("status-text");
  var clearBtn = document.getElementById("status-clear");
  text.textContent = msg;
  el.className = "status show " + type;

// DROP ZONE
var dropZone  = document.getElementById("drop-zone");
var fileInput = document.getElementById("file-input");

dropZone.addEventListener("click", function(){ fileInput.click(); });
dropZone.addEventListener("dragenter", function(e){ e.preventDefault(); e.stopPropagation(); dropZone.classList.add("over"); });
dropZone.addEventListener("dragover",  function(e){ e.preventDefault(); e.stopPropagation(); dropZone.classList.add("over"); });
dropZone.addEventListener("dragleave", function(e){ e.preventDefault(); e.stopPropagation(); dropZone.classList.remove("over"); });
dropZone.addEventListener("drop", function(e){
  e.preventDefault(); e.stopPropagation();
  dropZone.classList.remove("over");
  var files = e.dataTransfer.files;
  if (files && files.length > 0) processFile(files[0]);
});
fileInput.addEventListener("change", function(e){
  if (e.target.files && e.target.files.length > 0) processFile(e.target.files[0]);
});

function processFile(file) {
  if (!file.name.match(/\.xlsx?$/i)) {
    showStatus("⚠️ Fichier non valide (.xlsx ou .xls requis)", "err", false); return;
  }
  showStatus("⏳ Lecture du fichier en cours…", "info", false);
  var reader = new FileReader();
  reader.onerror = function(){ showStatus("❌ Impossible de lire le fichier.", "err", false); };
  reader.onload = function(ev){
    try {
      var data = new Uint8Array(ev.target.result);
      var wb = XLSX.read(data, { type:"array", cellDates:true, cellText:false, cellNF:false });
      allSheets = {};
      var sel = document.getElementById("sheet-sel");
      sel.innerHTML = "";
      wb.SheetNames.forEach(function(name){
        var ws = wb.Sheets[name];
        var rows = XLSX.utils.sheet_to_json(ws, { defval:"", raw:false, dateNF:"dd/mm/yyyy" });
        var valid = rows.filter(function(r){ return getField(r,"nom") || getField(r,"prenom"); });
        if (valid.length > 0){
          allSheets[name] = valid;
          var opt = document.createElement("option");
          opt.value = name;
          opt.textContent = name + " (" + valid.length + " élèves)";
          sel.appendChild(opt);
        }
      });
      var nb = Object.keys(allSheets).length;
      if (nb === 0){ showStatus("⚠️ Aucune donnée valide trouvée.", "err", false); return; }
      showStatus("✅ Fichier chargé — " + nb + " feuille(s) avec données", "ok", true);
      document.getElementById("controls").style.display = "block";
      document.getElementById("preview-section").style.display = "none";
      updateInfoBox();
    } catch(err){ showStatus("❌ Erreur : " + err.message, "err", false); }
  };
  reader.readAsArrayBuffer(file);
}

// FIELD GETTER
function getField(row, type) {
  var keys = Object.keys(row);
  function normalizeKey(s){
    return String(s || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[̀-ͯ]/g, "")
      .replace(/[^a-z0-9]+/g, " ")
      .trim();
  }
  var normalized = {};
  for (var i = 0; i < keys.length; i++) normalized[normalizeKey(keys[i])] = keys[i];

  var exactMap = {
    "bts": ["intitule bts", "bts"],
    "session": ["session"],
    "nom": ["nom de famille", "nom prenom", "nom"],
    "prenom": ["prenom"],
    "naissance": ["date naissance", "ne e le", "nee le", "ne le"],
    "id": ["id national", "n national", "national"],
    "repere": ["repere e", "repere e " , "repere"],
    "epreuve": ["epreuve en clair", "epreuve"],
    "date": ["date"],
    "heure": ["heure"],
    "salle": ["salle"]
  };

  var targets = exactMap[type] || [type];
  for (var j = 0; j < targets.length; j++) {
    var target = normalizeKey(targets[j]);
    if (normalized[target] !== undefined) return (row[normalized[target]] || "").toString().trim();
  }
  return "";
}

function norm(row){
  return {
    bts:       getField(row,"bts"),
    session:   getField(row,"session"),
    nom:       getField(row,"nom"),
    prenom:    getField(row,"prenom"),
    naissance: getField(row,"naissance"),
    id:        getField(row,"id"),
    repere:    getField(row,"repere"),
    epreuve:   getField(row,"epreuve"),
    date:      getField(row,"date"),
    heure:     getField(row,"heure"),
    salle:     getField(row,"salle")
  };
}

function fmtDate(d){
  if (!d) return "";
  var s = String(d).trim().split("T")[0];
  var m;
  if ((m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/))) return m[3] + "/" + m[2] + "/" + m[1];
  if ((m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/))) return s;
  if ((m = s.match(/^(\d{2})\/(\d{2})\/(\d{2})$/))) return m[1] + "/" + m[2] + "/20" + m[3];
  return d;
}

// INFO BOX
document.getElementById("sheet-sel").addEventListener("change", updateInfoBox);
document.getElementById("doc-type").addEventListener("change", updateInfoBox);

function updateInfoBox(){
  var name  = document.getElementById("sheet-sel").value;
  var type  = document.getElementById("doc-type").value;
  var rows  = allSheets[name];
  var box   = document.getElementById("info-box");
  if (!rows){ box.style.display="none"; return; }
  var data  = rows.map(norm).filter(function(r){ return r.nom||r.prenom; });
  var nb    = data.length;
  var msgs  = [];
  if (type === "both" || type === "conv")  msgs.push("<strong>" + nb + " convocations</strong> (1 page A4 par candidat)");
  if (type === "both" || type === "emarg") msgs.push("<strong>1 feuille d'émargement</strong> avec les " + nb + " candidats (A4 paysage)");
  box.innerHTML = "📄 " + msgs.join(" + ");
  box.style.display = "block";
}

document.getElementById("btn-reset").addEventListener("click", function(){
  var input = document.getElementById("file-input");
  var status = document.getElementById("status-msg");
  var controls = document.getElementById("controls");
  var preview = document.getElementById("preview-section");
  var info = document.getElementById("info-box");
  var printArea = document.getElementById("print-area");
  var sel = document.getElementById("sheet-sel");
  var tblHead = document.getElementById("tbl-head");
  var tblBody = document.getElementById("tbl-body");
  var previewLbl = document.getElementById("preview-lbl");
  var countBadge = document.getElementById("count-badge");

  allSheets = {};
  input.value = "";
  sel.innerHTML = "";
  tblHead.innerHTML = "";
  tblBody.innerHTML = "";
  previewLbl.textContent = "Aperçu";
  countBadge.textContent = "";
  controls.style.display = "none";
  preview.style.display = "none";
  info.style.display = "none";
  info.innerHTML = "";
  printArea.innerHTML = "";
  showStatus("↺ Page réinitialisée. Vous pouvez importer un nouveau fichier Excel.", "info", false);
  window.scrollTo({ top: 0, behavior: "smooth" });
});

document.getElementById("btn-preview").addEventListener("click", function(){
  var name = document.getElementById("sheet-sel").value;
  var rows = allSheets[name];
  if (!rows) return;
  var data = rows.map(norm).filter(function(r){ return r.nom||r.prenom; });

  document.getElementById("preview-lbl").textContent = "Aperçu — " + name;
  document.getElementById("count-badge").textContent  = data.length + " candidats";

  var head = document.getElementById("tbl-head");
  var body = document.getElementById("tbl-body");
  head.innerHTML = "<tr><th>#</th><th>Nom</th><th>Prénom</th><th>Naissance</th><th>N° National</th><th>Repère</th><th>Épreuve</th><th>Date</th><th>Heure</th><th>Salle</th></tr>";
  body.innerHTML = "";

  data.slice(0, 40).forEach(function(r, i){
    var tr = document.createElement("tr");
    tr.innerHTML = "<td>"+(i+1)+"</td><td>"+r.nom+"</td><td>"+r.prenom+"</td><td>"+fmtDate(r.naissance)+
      "</td><td>"+r.id+"</td><td>"+r.repere+"</td><td>"+r.epreuve+"</td><td>"+
      fmtDate(r.date)+"</td><td>"+r.heure+"</td><td>"+r.salle+"</td>";
    body.appendChild(tr);
  });
  if (data.length > 40){
    var tr2 = document.createElement("tr");
    tr2.innerHTML = "<td colspan='10' style='text-align:center;color:var(--muted);padding:10px'>… et "+(data.length-40)+" autres candidats</td>";
    body.appendChild(tr2);
  }
  var sec = document.getElementById("preview-section");
  sec.style.display = "block";
  sec.scrollIntoView({ behavior:"smooth" });
});

// GENERATE & PRINT
document.getElementById("btn-gen").addEventListener("click", function(){
  var name   = document.getElementById("sheet-sel").value;
  var rows   = allSheets[name];
  var type   = document.getElementById("doc-type").value;
  var etab   = document.getElementById("f-etab").value   || "Établissement";
  var centre = document.getElementById("f-centre").value || "Centre d'examen";

  if (!rows || rows.length === 0){ showStatus("⚠️ Aucune donnée à générer.", "err", false); return; }

  // Données triées alphabétiquement
  var data = rows.map(norm).filter(function(r){ return r.nom||r.prenom; });
  data.sort(function(a,b){ return (a.nom+" "+a.prenom).localeCompare(b.nom+" "+b.prenom,"fr"); });

  var first    = data[0];
  var btsLabel = first.bts || name;
  var session  = first.session || "2026";

  var pages = [];

  // ════════════════════════════════
  // 1 CONVOCATION PAR CANDIDAT
  // ════════════════════════════════
  if (type === "conv" || type === "both"){
    data.forEach(function(r, idx){
      var nom = (r.nom + " " + r.prenom).trim();
      var ep  = r.epreuve  || "Épreuve de spécialité";
      var naiss = fmtDate(r.naissance) || "—";
      var dt  = fmtDate(r.date) || "—";
      var hr  = r.heure    || "—";
      var sl  = r.salle    || "—";
      var rep = r.repere   || "—";
      var id  = r.id       || "—";

      // Saut de page sauf si dernier ET pas d'émargement après
      var addBreak = (idx < data.length - 1) || (type === "both");

      pages.push(
        "<div class=\"conv-page" + (addBreak ? " page-break" : "") + "\">" +
        "<div class=\"conv-bandeau\">" +
          "<div class=\"left-wrap\">" +
            (LOGO_DATA_URI ? "<img class=\"logo-chev\" src=\"" + LOGO_DATA_URI + "\" alt=\"Logo Chevrollier\">" : "") +
            "<div class=\"etab\"><strong>" + etab + "</strong><br>Brevet de Technicien Supérieur<br>Session " + session + "</div>" +
          "</div>" +
          "<div class=\"ref\">N° candidat : <strong>" + id + "</strong></div>" +
        "</div>" +
        "<div class=\"conv-h1\">Convocation</div>" +
        "<div class=\"conv-h2\">" + btsLabel + "</div>" +
        "<div class=\"conv-ident\">" +
          "<p>M. / Mme <strong>" + nom + "</strong></p>" +
          "<p>Né(e) le : <strong>" + naiss + "</strong> &nbsp;—&nbsp; N° National : <strong>" + id + "</strong></p>" +
        "</div>" +
        "<div class=\"conv-encadre\">" +
          "<table>" +
            "<tr><td>Épreuve :</td><td><strong>" + ep + "</strong></td></tr>" +
            "<tr><td>Repère de l'épreuve :</td><td><strong>" + rep + "</strong></td></tr>" +
            "<tr><td>Date de l'épreuve :</td><td>" + dt + "</td></tr>" +
            "<tr><td>Heure de convocation :</td><td>" + hr + "</td></tr>" +
            "<tr><td>Salle :</td><td>" + sl + "</td></tr>" +
            "<tr><td>Lieu :</td><td>" + centre + "</td></tr>" +
          "</table>" +
        "</div>" +
        "<div class=\"conv-note\">Vous devrez vous présenter muni(e) de cette convocation, d'une pièce d'identité en cours de validité et de l'ensemble de vos travaux (dossier, maquette, supports…) 15 min avant l'épreuve. Tout retard non justifié sera signalé au jury.</div>" +
        "<div class=\"conv-footer-row\">" +
          "<div class=\"conv-footer-left\">" + (AC_NANTES_DATA_URI ? "<img class=\"ac-logo\" src=\"" + AC_NANTES_DATA_URI + "\" alt=\"Logo Académie de Nantes\">" : "") + "</div>" +
          "<div class=\"conv-sign\"><div class=\"titre\">Le Directeur Délégué aux Formations Professionnelles et Technologiques</div><div><strong>Sébastien Deschamps</strong></div>" + (SIGNATURE_DATA_URI ? "<img class=\"signature-img\" src=\"" + SIGNATURE_DATA_URI + "\" alt=\"Signature\">" : "<div class=\"espace\"></div>") + "<strong>" + etab + "</strong></div>" +
        "</div>" +
        "</div>"
      );
    });
  }

  // ════════════════════════════════
  // 1 SEULE FEUILLE D'ÉMARGEMENT
  // pour tous les candidats
  // ════════════════════════════════
  if (type === "emarg" || type === "both"){
    // Infos communes (épreuve, date, salle, heure depuis la 1ère ligne avec données)
    var epRef = "—", dtRef = "—", slRef = "—";
    for (var i = 0; i < data.length; i++){
      if (data[i].epreuve){ epRef = data[i].epreuve; break; }
    }
    for (var i = 0; i < data.length; i++){
      if (data[i].date){ dtRef = fmtDate(data[i].date); break; }
    }
    for (var i = 0; i < data.length; i++){
      if (data[i].salle){ slRef = data[i].salle; break; }
    }

    var lignes = data.map(function(r, i){
      return "<tr>" +
        "<td style=\"text-align:center\">" + (i+1) + "</td>" +
        "<td class=\"col-nom\">" + r.nom + "</td>" +
        "<td class=\"col-prenom\">" + r.prenom + "</td>" +
        "<td class=\"col-naiss\" style=\"text-align:center\">" + fmtDate(r.naissance) + "</td>" +
        "<td class=\"col-id\" style=\"text-align:center\">" + r.id + "</td>" +
        "<td class=\"col-rep\" style=\"text-align:center\">" + r.repere + "</td>" +
        "<td class=\"col-heure\" style=\"text-align:center\">" + r.heure + "</td>" +
        "<td class=\"col-sign\"></td>" +
        "<td class=\"col-sign\"></td>" +
        "</tr>";
    }).join("");

    pages.push(
      "<div class=\"emarg-page\">" +
      "<div class=\"emarg-entete\">" +
        "<div class=\"emarg-titre\">Feuille d'émargement</div>" +
        "<span><strong>BTS :</strong> " + btsLabel + "</span>" +
        "<span><strong>Session :</strong> " + session + "</span>" +
        "<span><strong>Épreuve :</strong> " + epRef + "</span>" +
        "<span><strong>Date :</strong> " + dtRef + "</span>" +
        "<span><strong>Salle :</strong> " + slRef + "</span>" +
        "<span><strong>Centre :</strong> " + centre + "</span>" +
      "</div>" +
      "<table class=\"emarg-table\">" +
        "<thead><tr>" +
          "<th style=\"width:28px\">N°</th>" +
          "<th class=\"col-nom\">Nom</th>" +
          "<th class=\"col-prenom\">Prénom</th>" +
          "<th class=\"col-naiss\">Date de naissance</th>" +
          "<th class=\"col-id\">N° National</th>" +
          "<th class=\"col-rep\">Repère</th>" +
          "<th class=\"col-heure\">Heure</th>" +
          "<th class=\"col-sign\">Signature candidat</th>" +
          "<th class=\"col-sign\">Visa examinateur</th>" +
        "</tr></thead>" +
        "<tbody>" + lignes + "</tbody>" +
      "</table>" +
      "<div class=\"emarg-bas\">" +
        "<span>Total : " + data.length + " candidat(s)</span>" +
        "<span>Épreuve : " + epRef + "</span>" +
        "<span>Session " + session + " — " + etab + "</span>" +
      "</div>" +
      "</div>"
    );
  }

  document.getElementById("print-area").innerHTML = pages.join("");
  showStatus("✅ " + (type==="conv"?data.length+" convocation(s)":type==="emarg"?"1 feuille d'émargement ("+data.length+" candidats)":data.length+" convocations + 1 feuille d'émargement") + " — impression en cours…", "ok", true);
  setTimeout(function(){ window.print(); }, 400);
});
</script>
</body>
</html>
